<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#39d353" stroke-width="14" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner dashed ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#39d353" stroke-width="3" opacity="0.25" stroke-dasharray="12 8"/>
  <!-- AA Text -->
  <text x="256" y="326" 
    font-family="Arial Black, Arial, sans-serif"
    font-size="210" font-weight="900"
    text-anchor="middle"
    fill="#39d353"
    filter="url(#glow)"
    letter-spacing="-8">AA</text>
</svg>
